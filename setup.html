<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Setup Interests</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ff;
      --card: #ffffff;
      --primary: #c4a8f5;
      --primary-dark: #a782e8;
      --accent: #f9c6d0;
      --accent2: #b8e8e0;
      --text: #4a3f6b;
      --text-light: #8e84aa;
      --border: #e8e0f7;
      --shadow: 0 4px 20px rgba(180,160,240,0.15);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      min-height: 420px;
      padding: 20px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, #f0e4ff 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -40px; left: -40px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, #d6f5f0 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .content { position: relative; z-index: 1; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent2), #a8ddd4);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 3px 10px rgba(168,221,212,0.4);
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .header-text p {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 600;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .interests-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .interest-btn {
      padding: 12px 8px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .interest-btn .emoji {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }
    .interest-btn:hover {
      border-color: var(--accent2);
      transform: translateY(-2px);
    }
    .interest-btn.selected {
      background: linear-gradient(135deg, #d6f5f0, #b8e8e0);
      border-color: #7ecfc0;
      color: #2d7a6e;
      box-shadow: 0 4px 12px rgba(126,207,192,0.35);
    }

    .save-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #b8e8e0, #7ecfc0);
      color: #2d6b62;
      border: none;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(126,207,192,0.35);
    }
    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(126,207,192,0.45);
    }
    .save-btn:active { transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .content > * {
      animation: fadeUp 0.35s ease both;
    }
    .content > *:nth-child(1) { animation-delay: 0.05s; }
    .content > *:nth-child(2) { animation-delay: 0.10s; }
    .content > *:nth-child(3) { animation-delay: 0.15s; }
    .content > *:nth-child(4) { animation-delay: 0.20s; }
  </style>
</head>
<body>
<div class="content">

  <div class="header">
    <div class="logo">🎯</div>
    <div class="header-text">
      <h1>Your Interests</h1>
      <p>What will you do instead?</p>
    </div>
  </div>

  <div class="section-label">Select all that apply</div>

  <div class="interests-grid" id="interests">
    <button class="interest-btn" id="sports"><span class="emoji">🏃</span>Sports</button>
    <button class="interest-btn" id="entertainment"><span class="emoji">🎬</span>Movies & Music</button>
    <button class="interest-btn" id="coding"><span class="emoji">💻</span>Coding</button>
    <button class="interest-btn" id="gaming"><span class="emoji">🎮</span>Gaming</button>
    <button class="interest-btn" id="food"><span class="emoji">🍳</span>Cooking</button>
    <button class="interest-btn" id="research"><span class="emoji">🔬</span>Learning</button>
    <button class="interest-btn" id="reading"><span class="emoji">📚</span>Reading</button>
    <button class="interest-btn" id="other"><span class="emoji">✨</span>Other</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Interests →</button>

</div>
<script src="setup.js"></script>
</body>
</html>
